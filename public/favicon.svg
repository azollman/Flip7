<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Three fanned cards with 7 prominent -->
  <!-- Back card (left) -->
  <rect x="2" y="6" width="18" height="24" rx="3" ry="3" fill="#1565c0" stroke="#0d47a1" stroke-width="1" transform="rotate(-15, 11, 18)"/>
  <!-- Back card (right) -->
  <rect x="12" y="6" width="18" height="24" rx="3" ry="3" fill="#1565c0" stroke="#0d47a1" stroke-width="1" transform="rotate(15, 21, 18)"/>
  <!-- Front card (center) -->
  <rect x="7" y="4" width="18" height="24" rx="3" ry="3" fill="white" stroke="#1a1a2e" stroke-width="1.2"/>
  <text x="16" y="20" font-family="Georgia, serif" font-size="16" font-weight="bold" fill="#cc0000" text-anchor="middle">7</text>
</svg>
